<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TapRanked — Admin Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{max-width:380px;width:100%;padding:32px 20px}
h1{font-size:1.5rem;text-align:center;color:#fff;margin-bottom:4px}
.sub{text-align:center;color:#94a3b8;font-size:.85rem;margin-bottom:32px}
.error{background:#7f1d1d;color:#fca5a5;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.9rem}
label{display:block;font-size:.85rem;color:#94a3b8;margin-bottom:6px}
input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#fff;font-size:.95rem;margin-bottom:16px}
input::placeholder{color:#64748b}
input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.25)}
button{width:100%;padding:12px;border-radius:8px;border:none;background:#3b82f6;color:#fff;font-weight:700;font-size:1rem;cursor:pointer}
button:hover{background:#2563eb}
</style>
</head>
<body>
<div class="wrap">
  <h1>TapRanked</h1>
  <p class="sub">Admin Login</p>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form method="post">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="admin@tapranked.com" required autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Password" required>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
